<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <h1 class="nav-brand">🎬 MyTracker</h1>
        <div class="nav-links">
            <button id="nav-explore" class="nav-btn active">Explore Library</button>
            <button id="nav-add" class="nav-btn">Add Movie</button>
        </div>
    </nav>

    <div id="app-container">
        
        <div id="explore-view">
            <div class="control-bar">
                <input type="text" id="library-search" placeholder="Search my library...">
                <select id="sort-select">
                    <option value="name_asc">Name (A-Z)</option>
                    <option value="name_desc">Name (Z-A)</option>
                    <option value="rating_desc">Highest Rated</option>
                    <option value="year_desc">Newest Release</option>
                </select>
            </div>

            <div id="genre-container" class="genre-scroll">
                </div>
            
            <div id="movie-list" style="margin-top: 15px;"></div>
        </div>

<div id="add-view" class="view-hidden">
            <h2 style="text-align: center; margin-bottom: 20px;">Add to Library</h2>
            
            <div class="search-section">
                <input type="text" id="movie-search" placeholder="Search TMDB for a new movie...">
                <button id="search-btn">Search TMDB</button>
            </div>
            <div id="results-container"></div>

            <hr style="margin: 30px 0;">

            <div style="background-color: #2a2c33; padding: 25px; border-radius: 8px; text-align: center;">
                <h3>🤖 Bulk Import Wizard</h3>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px;">
                    Upload a CSV file. Columns must be: <strong>Title, Year, Rating (1-5)</strong>
                </p>
                <input type="file" id="csv-file" accept=".csv" style="display: block; margin: 0 auto 15px auto;">
                <button id="run-import-btn" style="background-color: #4CAF50;">Run Import</button>
                <p id="import-status" style="margin-top: 15px; font-weight: bold; color: white;"></p>
            </div>
        </div>

    </div>

    <div id="movie-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
