<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <h1>My Movie Tracker</h1>
        
        <div class="search-section">
            <input type="text" id="movie-search" placeholder="Search TMDB to add a movie...">
            <button id="search-btn">Search TMDB</button>
        </div>
        <div id="results-container"></div>

        <hr>

        <div id="library-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>My Library</h2>
                <select id="sort-select" style="padding: 8px; background: #2a2c33; color: white; border-radius: 4px; border: none;">
                    <option value="name_asc">Name (A-Z)</option>
                    <option value="name_desc">Name (Z-A)</option>
                    <option value="rating_desc">Highest Rated</option>
                    <option value="year_desc">Newest Release</option>
                </select>
            </div>
            
            <div id="movie-list" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="movie-modal" class="modal hidden">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
